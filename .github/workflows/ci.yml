name: Machine Learning Workflow CI Advance

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train-and-push-docker:
    runs-on: ubuntu-latest

    steps:
    # 1. Ambil source code dari repository GitHub
    - name: Checkout repository code
      uses: actions/checkout@v3

    # 2. Pasang Python versi 3.12 di server GitHub
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    # 3. Install semua library yang dibutuhkan
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 scikit-learn pandas numpy

    # 4. Jalankan training model lokal di dalam folder MLProject
    - name: Run MLflow Project Retraining
      run: |
        cd MLProject
        python modelling.py

    # 5. Login otomatis ke Docker Hub menggunakan gembok rahasia yang kamu simpan kemarin
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 6. Build model menjadi Docker Image dan Push langsung ke Docker Hub kamu
    - name: Build and Push MLflow Docker Image
      run: |
        cd MLProject
        mlflow models build-docker -m "mlruns/0/" -n "aliyapradnya/crop_recommendation_model:latest"
        docker push aliyapradnya/crop_recommendation_model:latest